services:
  mysql-db:
    image: mysql:8.0
    container_name: app-api-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: app_db
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    ports:
      - 3306:3306
    volumes:
      - app_mysql_data:/var/lib/mysql

volumes:
  app_mysql_data:
